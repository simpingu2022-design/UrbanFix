<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricians - UrbanFix</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-hammer"></i>
                UrbanFix
            </div>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="electrician.html">Electricians</a>
                <a href="plumber.html">Plumbers</a>
                <a href="carpenter.html">Carpenters</a>
                <a href="painter.html">Painters</a>
                <a href="#" id="logoutBtn" style="display:none;">Logout</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <div class="login-container" id="loginContainer"></div>

    <main class="main-content" id="mainContent">
        <section class="hero" style="background: linear-gradient(135deg, #ffd452 0%, #ff6b6b 100%); padding: 140px 0 80px;">
            <div class="container">
                <div style="text-align: center; color: #333;">
                    <h1 style="font-size: 3rem; font-weight: 800; margin-bottom: 20px;">Electricians</h1>
                    <p style="font-size: 1.3rem; max-width: 600px; margin: 0 auto;">Expert electrical services for wiring, lights, fans, switches & repairs</p>
                </div>
            </div>
        </section>

        <section class="workers-section">
            <div class="container">
                <div id="workersContainer"></div>
            </div>
        </section>
    </main>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Book Service</h3>
                <span class="close">&times;</span>
            </div>
            <form id="bookingForm">
                <input type="hidden" id="workerName" />
                <div class="input-group">
                    <i class="fas fa-map-marker-alt"></i>
                    <input type="text" id="address" placeholder="Your full address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-calendar"></i>
                    <input type="date" id="bookingDate" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" placeholder="Your phone number" required>
                </div>
                <button type="submit" class="btn-primary full-width">Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Load user state and show content
        document.addEventListener('DOMContentLoaded', function() {
            const savedUser = localStorage.getItem('urbanfix_user');
            if (!savedUser) {
                window.location.href = 'index.html';
                return;
            }
            showMainContent();
            generateWorkers('electrician');
        });
    </script>
</body>
</html>
